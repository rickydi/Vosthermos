<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Merci pour votre message - Vosthermos, spécialiste en réparation de portes et fenêtres">
    <title>Merci pour votre message - Vosthermos</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/serve-fix.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .thank-you-container {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: linear-gradient(to right, rgba(0, 56, 69, 0.9), rgba(0, 56, 69, 0.7));
        }
        
        .thank-you-logo {
            max-width: 300px;
            margin-bottom: 40px;
        }
        
        .thank-you-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: white;
        }
        
        .thank-you-message {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
            color: white;
        }
        
        .return-home-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(227, 7, 24, 0.4);
            text-decoration: none;
            display: inline-block;
        }
        
        .return-home-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(227, 7, 24, 0.6);
        }
    </style>
</head>
<body>
    <div class="thank-you-container">
        <img src="images/cropped-Vos-Thermos-Logo_Fond.jpg" alt="Vosthermos Logo" class="thank-you-logo">
        <h1 class="thank-you-title">Merci pour votre message!</h1>
        <p class="thank-you-message">
            Nous avons bien reçu votre demande et nous vous répondrons dans les plus brefs délais.
            Notre équipe s'engage à vous fournir un service de qualité pour tous vos besoins en réparation 
            de portes et fenêtres.
        </p>
        <a href="index.html" class="return-home-btn">Retourner à l'accueil</a>
    </div>
</body>
</html>
