<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Merci pour votre message - Vosthermos">
    <title>Merci - Vosthermos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #002530 0%, #003845 50%, #002530 100%);
            color: white;
            padding: 24px;
        }
        .thank-you {
            text-align: center;
            max-width: 560px;
        }
        .thank-you-logo {
            max-width: 240px;
            margin: 0 auto 40px;
            display: block;
        }
        .thank-you h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 20px;
        }
        .thank-you p {
            font-size: 1.05rem;
            line-height: 1.7;
            opacity: 0.85;
            margin-bottom: 36px;
        }
        .btn-home {
            display: inline-block;
            padding: 14px 36px;
            background: #e30718;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(227, 7, 24, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(227, 7, 24, 0.5);
        }
    </style>
</head>
<body>
    <div class="thank-you">
        <img src="images/cropped-Vos-Thermos-Logo_Fond.jpg" alt="Vosthermos Logo" class="thank-you-logo">
        <h1>Merci pour votre message!</h1>
        <p>Nous avons bien recu votre demande et nous vous repondrons dans les plus brefs delais. Notre equipe s'engage a vous fournir un service de qualite pour tous vos besoins en reparation de portes et fenetres.</p>
        <a href="index.html" class="btn-home">Retourner a l'accueil</a>
    </div>
</body>
</html>
