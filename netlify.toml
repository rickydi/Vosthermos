# Configuration Netlify pour Vosthermos

[build]
  publish = "./"  # Dossier contenant les fichiers à déployer (racine du projet)

# Redirection spécifique pour les pages dans le répertoire pages
[[redirects]]
  from = "/pages/*"
  to = "/pages/:splat"
  status = 200

# Redirection spécifique pour la page d'accueil
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  force = true

# Redirection générale pour SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false  # Ne pas forcer la redirection si le fichier existe

# En-têtes de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"  # Évite les problèmes de cache
