<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification des images - Vosthermos</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #00353c;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .image-item {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .image-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        
        .image-info {
            padding: 15px;
        }
        
        .image-path {
            font-size: 0.9rem;
            color: #666;
            word-break: break-all;
            margin: 5px 0;
        }
        
        .status {
            margin-top: 10px;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            font-weight: bold;
        }
        
        .status-success {
            background-color: #d4edda;
            color: #155724;
        }
        
        .status-error {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .actions {
            text-align: center;
            margin-top: 30px;
        }
        
        .btn {
            display: inline-block;
            background-color: #e30718;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin: 0 10px;
        }
        
        .btn:hover {
            background-color: #c60615;
        }
    </style>
</head>
<body>
    <h1>Vérification des images du site Vosthermos</h1>
    
    <div class="image-grid" id="imageGrid">
        <!-- Les images seront chargées dynamiquement ici -->
    </div>
    
    <div class="actions">
        <a href="../index.html" class="btn">Retour au site</a>
        <a href="admin-link.html" class="btn">Aller à l'administration</a>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Liste de toutes les images du site
            const images = [
                { path: '../images/Vos-Thermos-Logo-petit.png', name: 'Logo Vosthermos' },
                { path: '../images/WhatsApp-Image-2024-08-14-at-20.46.18_f332cc9e.jpg', name: 'Arrière-plan' },
                { path: '../images/shortbreeze_un_homme_habiller_professionel_qui_travail_a_repare_ccc02e18-73b8-4378-9c3d-70b94bc61a05.png', name: 'Image Accueil' },
                { path: '../images/WhatsApp-Image-2024-07-12-at-14.15.56_133ff3dc-e1725767270278.jpg', name: 'Image Services' },
                { path: '../images/WhatsApp-Image-2024-09-06-at-13.48.48_3d91e432.jpg', name: 'Image Pourquoi Nous' },
                { path: '../images/WhatsApp-Image-2024-09-18-at-12.29.51_1677a930.jpg', name: 'Image Galerie' },
                { path: '../images/WhatsApp-Image-2024-09-06-at-16.30.03_1fa8c206.jpg', name: 'Image À Propos' },
                { path: '../images/WhatsApp-Image-2024-07-04-at-14.47.52_d3c4edaa.jpg', name: 'Galerie Image 1' },
                { path: '../images/WhatsApp-Image-2024-08-22-at-13.31.56_6c284fc7-e1725767164842.jpg', name: 'Galerie Image 2' },
                { path: '../images/WhatsApp-Image-2024-09-02-at-12.46.02_6be6c77b.jpg', name: 'Galerie Image 3' },
                { path: '../images/WhatsApp-Image-2024-09-05-at-15.27.12_ad008d3b.jpg', name: 'Galerie Image 4' }
            ];
            
            const imageGrid = document.getElementById('imageGrid');
            
            // Créer un élément pour chaque image
            images.forEach(image => {
                const imageItem = document.createElement('div');
                imageItem.className = 'image-item';
                
                const img = document.createElement('img');
                img.src = image.path;
                img.alt = image.name;
                
                // Vérifier si l'image charge correctement
                img.onload = function() {
                    status.textContent = 'Chargée avec succès';
                    status.className = 'status status-success';
                };
                
                img.onerror = function() {
                    status.textContent = 'Erreur de chargement';
                    status.className = 'status status-error';
                    img.src = 'data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22318%22%20height%3D%22180%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20318%20180%22%20preserveAspectRatio%3D%22none%22%3E%3Cdefs%3E%3Cstyle%20type%3D%22text%2Fcss%22%3E%23holder_158bd1d28ef%20text%20%7B%20fill%3A%23868e96%3Bfont-weight%3Abold%3Bfont-family%3AArial%2C%20Helvetica%2C%20Open%20Sans%2C%20sans-serif%2C%20monospace%3Bfont-size%3A16pt%20%7D%20%3C%2Fstyle%3E%3C%2Fdefs%3E%3Cg%20id%3D%22holder_158bd1d28ef%22%3E%3Crect%20width%3D%22318%22%20height%3D%22180%22%20fill%3D%22%23777%22%3E%3C%2Frect%3E%3Cg%3E%3Ctext%20x%3D%22109.203125%22%20y%3D%2297.5%22%3EImage%20non%20trouvée%3C%2Ftext%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E';
                };
                
                const imageInfo = document.createElement('div');
                imageInfo.className = 'image-info';
                
                const imageName = document.createElement('h3');
                imageName.textContent = image.name;
                
                const imagePath = document.createElement('div');
                imagePath.className = 'image-path';
                imagePath.textContent = image.path;
                
                const status = document.createElement('div');
                status.className = 'status';
                status.textContent = 'Chargement...';
                
                imageInfo.appendChild(imageName);
                imageInfo.appendChild(imagePath);
                imageInfo.appendChild(status);
                
                imageItem.appendChild(img);
                imageItem.appendChild(imageInfo);
                
                imageGrid.appendChild(imageItem);
            });
        });
    </script>
</body>
</html>
